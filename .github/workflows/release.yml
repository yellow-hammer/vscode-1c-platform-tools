# Публикует VSIX в GitHub Release, VS Code Marketplace и Open VSX Registry; обновляет CHANGELOG.
# Запуск: пуш тега v* или вручную (workflow_dispatch) с вводом версии.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например, v0.1.0 или v0.1.0-rc.1)'
        required: true
        type: string
      skip_publish:
        description: 'Пропустить публикацию в маркетплейсы (только GitHub Release)'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Создать черновик релиза (не публикуется публично)'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Пометить релиз как предварительный (alpha/beta/rc)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    permissions:
      contents: write # создание релизов
      packages: write # публикация в VS Code Marketplace

    steps:
      - name: Получить код
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # нужно для git-cliff

      - name: Установить Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Установить зависимости
        run: npm ci

      - name: Проверить линтером
        run: npm run lint

      - name: Скомпилировать TypeScript
        run: npm run compile

      - name: Определить версию (из тега или ввода)
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION=${VERSION#v}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Версия: $VERSION"

      - name: Обновить версию в package.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          BRANCH="main"
          git checkout $BRANCH
          # Обновляем версию в package.json и package-lock.json (ошибка игнорируется, если версия уже совпадает)
          npm version ${{ steps.ver.outputs.version }} --no-git-tag-version || echo "Версия уже совпадает — пропуск"
          git add package.json package-lock.json
          if git diff --staged --quiet; then
            echo "Версия уже совпадает — коммит не нужен"
          else
            git commit -m "chore(release): prepare for v${{ steps.ver.outputs.version }}"
            git push origin $BRANCH
          fi

      - name: Создать и отправить тег, если его нет (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Тег $TAG уже существует — пропуск"
          else
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Установить Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Кэшировать cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-git-cliff-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-cliff-

      - name: Установить git-cliff
        run: |
          if ! command -v git-cliff &> /dev/null; then
            cargo install git-cliff --locked
          fi
          git-cliff --version

      - name: Сгенерировать CHANGELOG
        id: changelog
        run: |
          git-cliff --config cliff.toml --output CHANGELOG.md

          if [ -f CHANGELOG.md ]; then
            # Извлекаем только последний релиз (первый ## [version] до следующего ##)
            CHANGELOG=$(awk '
              /^## \[/ {
                if (found) exit
                found = 1
              }
              found { print }
            ' CHANGELOG.md)

            # Удаляем пустые строки в конце
            CHANGELOG=$(echo "$CHANGELOG" | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')

            # Если changelog пустой или слишком короткий — fallback на историю коммитов
            if [ -z "$CHANGELOG" ] || [ ${#CHANGELOG} -lt 20 ]; then
              CHANGELOG="## Изменения\n\nСм. [историю коммитов](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref }})"
            fi
          else
            CHANGELOG="## Изменения\n\nСм. [историю коммитов](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref }})"
          fi

          # Многострочный вывод в GitHub Actions
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo EOF
          } >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Закоммитить CHANGELOG
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          BRANCH="main"
          if [ -f CHANGELOG.md ]; then
            git add CHANGELOG.md
            if git diff --staged --quiet; then
              echo "CHANGELOG.md без изменений — коммит не нужен"
            else
              git commit -m "chore(deps): update changelog"
              git push origin $BRANCH
            fi
          fi
        continue-on-error: true

      - name: Собрать VSIX
        run: npm run package

      - name: Создать GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          files: |
            *.vsix
          body: |
            ## Версия ${{ steps.ver.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ### Установка

            Скачайте файл `.vsix` и установите через VS Code:
            - `Ctrl+Shift+P` → `Extensions: Install from VSIX...`
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' || false }}

      - name: Опубликовать в Open VSX Registry
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_publish != 'true'
        uses: HaaLeo/publish-vscode-extension@v1
        id: publishToOpenVSX
        with:
          pat: ${{ env.OVSX_TOKEN }}
          skipDuplicate: true

      - name: Опубликовать в VS Code Marketplace
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_publish != 'true'
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ env.VSCE_PAT }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.publishToOpenVSX.outputs.vsixPath }}
          skipDuplicate: true
