version: 2
updates:
  # npm-зависимости расширения
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      prod-dependencies:
        dependency-type: "production"
    ignore:
      # TypeScript 7 (нативный порт) ещё не поддерживается typescript-eslint
      # (peer typescript <6.1.0) — мажор ломает npm ci. Снять, когда появится поддержка.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # версии GitHub Actions в воркфлоу
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
