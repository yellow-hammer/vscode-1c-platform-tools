<!doctype html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}}; script-src 'nonce-{{NONCE}}';">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Свойства конфигурации</title>
	<link rel="stylesheet" href="{{BASE_CSS_URI}}">
	<link rel="stylesheet" href="{{CSS_URI}}">
</head>
<body>
	<div class="page">
		<header class="page-header">
			<div class="header-main">
				<div class="kind-badge">{{SOURCE_KIND_LABEL}}</div>
				<h1 class="title">{{SOURCE_LABEL}}</h1>
			</div>
		</header>

		<div class="content">
			<div class="edit-columns">
				<div class="edit-group" id="modulesSection">
					<div class="section-title">Модули</div>
					<div class="edit-fields">
						<div class="edit-row">
							<label class="edit-label">Модуль приложения</label>
							<div class="edit-control">
								<button id="openApplicationModule" class="edit-module-link" type="button">Открыть</button>
							</div>
						</div>
						<div class="edit-row">
							<label class="edit-label">Модуль сеанса</label>
							<div class="edit-control">
								<button id="openSessionModule" class="edit-module-link" type="button">Открыть</button>
							</div>
						</div>
						<div class="edit-row">
							<label class="edit-label">Модуль внешнего соединения</label>
							<div class="edit-control">
								<button id="openExternalConnectionModule" class="edit-module-link" type="button">Открыть</button>
							</div>
						</div>
					</div>
				</div>

				<div class="edit-group">
					<div class="section-title">Основные</div>
					<div class="edit-fields">
						<div class="edit-row">
							<label class="edit-label" for="name">Имя</label>
							<div class="edit-control"><input id="name" class="edit-input" type="text"></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="synonymRu">Синоним</label>
							<div class="edit-control"><input id="synonymRu" class="edit-input" type="text"></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="comment">Комментарий</label>
							<div class="edit-control"><textarea id="comment" class="edit-input" rows="2"></textarea></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="defaultRunMode">Основной режим запуска</label>
							<div class="edit-control"><select id="defaultRunMode" class="edit-input"></select></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="usePurposes">Назначение использования</label>
							<div class="edit-control"><input id="usePurposes" class="edit-input" type="text" placeholder="через запятую"></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="scriptVariant">Вариант встроенного языка</label>
							<div class="edit-control"><select id="scriptVariant" class="edit-input"></select></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="defaultRoles">Основные роли</label>
							<div class="edit-control"><textarea id="defaultRoles" class="edit-input" rows="2" placeholder="через запятую"></textarea></div>
						</div>
					</div>
				</div>

				<div class="edit-group">
					<div class="section-title">Представление</div>
					<div class="edit-fields">
						<div class="edit-row">
							<label class="edit-label" for="briefInformationRu">Краткая информация</label>
							<div class="edit-control"><textarea id="briefInformationRu" class="edit-input" rows="2"></textarea></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="detailedInformationRu">Подробная информация</label>
							<div class="edit-control"><textarea id="detailedInformationRu" class="edit-input" rows="3"></textarea></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="copyrightRu">Авторские права</label>
							<div class="edit-control"><textarea id="copyrightRu" class="edit-input" rows="2"></textarea></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="vendorInformationAddressRu">Адрес информации о поставщике</label>
							<div class="edit-control"><input id="vendorInformationAddressRu" class="edit-input" type="text"></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="configurationInformationAddressRu">Адрес информации о конфигурации</label>
							<div class="edit-control"><input id="configurationInformationAddressRu" class="edit-input" type="text"></div>
						</div>
					</div>
				</div>

				<div class="edit-group">
					<div class="section-title">Разработка</div>
					<div class="edit-fields">
						<div class="edit-row">
							<label class="edit-label" for="vendor">Поставщик</label>
							<div class="edit-control"><input id="vendor" class="edit-input" type="text"></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="version">Версия</label>
							<div class="edit-control"><input id="version" class="edit-input" type="text"></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="updateCatalogAddress">Адрес каталога обновлений</label>
							<div class="edit-control"><input id="updateCatalogAddress" class="edit-input" type="text"></div>
						</div>
					</div>
				</div>

				<div class="edit-group">
					<div class="section-title">Совместимость</div>
					<div class="edit-fields">
						<div class="edit-row">
							<label class="edit-label" for="dataLockControlMode">Режим управления блокировкой данных</label>
							<div class="edit-control"><select id="dataLockControlMode" class="edit-input"></select></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="objectAutonumerationMode">Режим автонумерации объектов</label>
							<div class="edit-control"><select id="objectAutonumerationMode" class="edit-input"></select></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="modalityUseMode">Режим использования модальности</label>
							<div class="edit-control"><select id="modalityUseMode" class="edit-input"></select></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="synchronousPlatformExtensionAndAddInCallUseMode">Режим использования синхронных вызовов расширений</label>
							<div class="edit-control"><select id="synchronousPlatformExtensionAndAddInCallUseMode" class="edit-input"></select></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="interfaceCompatibilityMode">Режим совместимости интерфейса</label>
							<div class="edit-control"><select id="interfaceCompatibilityMode" class="edit-input"></select></div>
						</div>
						<div class="edit-row">
							<label class="edit-label" for="compatibilityMode">Режим совместимости</label>
							<div class="edit-control"><select id="compatibilityMode" class="edit-input"></select></div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<footer class="save-bar">
		<span id="status" class="save-status"></span>
		<button id="saveBtn" class="primary-btn" type="button">Сохранить</button>
	</footer>
	<script nonce="{{NONCE}}">
		window.__INITIAL_DATA__ = {{INITIAL_JSON}};
		window.__SOURCE_KIND__ = "{{SOURCE_KIND}}";
	</script>
	<script nonce="{{NONCE}}" src="{{JS_URI}}"></script>
</body>
</html>
